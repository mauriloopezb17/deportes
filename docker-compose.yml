services:
  deportes-db:
    image: postgres:16-alpine
    container_name: deportes_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: equipo1
      POSTGRES_DB: deportes_db
    ports:
      - "5432:5432"
    volumes:
      - ./dataBase/init.sql:/docker-entrypoint-initdb.d/departamento_deportes_create.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: deportes_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
