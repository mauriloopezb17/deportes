services:
  deportes-db:
    image: postgres:16-alpine
    container_name: deportes_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: equipo1
      POSTGRES_DB: deportes_db
    ports:
      - "5432:5432"
    volumes:
      - ./dataBase/departamento_deportes_create.sql:/docker-entrypoint-initdb.d/01-departamento_deportes_create.sql:ro
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: