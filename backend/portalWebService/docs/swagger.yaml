openapi: 3.0.3
info:
  title: Portal Web Service - Deportes UCB
  description: API microservice for managing news, categories, portal configurations, info, and media uploads.
  version: 1.0.0
servers:
  - url: /api
    description: Base path (managed by NestJS global prefix)
paths:
  /:
    get:
      summary: Hello World
      description: Returns a simple hello world greeting.
      responses:
        '200':
          description: Successful response
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!
  /noticias:
    get:
      summary: List all news
      description: Retrieves a list of news items. Supports filtering by publication status.
      parameters:
        - name: publicado
          in: query
          description: Filter news by publication status ('true' or 'false')
          required: false
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: List of news items retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoticiaResponse'
    post:
      summary: Create a news item
      description: Creates a new news item. Required Admin permissions.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoticiaDto'
      responses:
        '201':
          description: News item created successfully
  /noticias/categorias:
    get:
      summary: List all news categories
      description: Retrieves all categories for news items.
      responses:
        '200':
          description: List of categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
  /noticias/{id}:
    get:
      summary: Get a news item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: News item retrieved successfully
    put:
      summary: Update a news item by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoticiaDto'
      responses:
        '200':
          description: News item updated successfully
    delete:
      summary: Delete a news item by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: News item deleted successfully
  /noticias/usuario/{id_usuario}:
    get:
      summary: Get news items by user author ID
      parameters:
        - name: id_usuario
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of news items retrieved successfully

  # --- NUEVOS ENDPOINTS DE INFO PÚBLICA ---
  /info/entrenadores:
    get:
      summary: Obtener lista de entrenadores
      description: Retorna la información pública de los entrenadores del club.
      tags:
        - Info Pública
      responses:
        '200':
          description: Lista de entrenadores recuperada exitosamente.
  /info/horarios:
    get:
      summary: Obtener horarios generales
      description: Retorna los horarios fijos de entrenamientos por disciplina y espacio.
      tags:
        - Info Pública
      responses:
        '200':
          description: Horarios recuperados exitosamente.
  /info/galeria-eventos:
    get:
      summary: Obtener galería de eventos del club
      description: Retorna las imágenes y videos públicos de la galería.
      tags:
        - Info Pública
      responses:
        '200':
          description: Galería de eventos recuperada exitosamente.
  /info/espacios:
    get:
      summary: Obtener espacios deportivos disponibles
      description: Retorna la información de las canchas y espacios activos.
      tags:
        - Info Pública
      responses:
        '200':
          description: Lista de espacios recuperada exitosamente.

  # --- NUEVOS ENDPOINTS DE GALERÍA ---
  /galeria:
    get:
      summary: Obtener la galería multimedia
      description: Retorna los elementos de la galería multimedia. Puede filtrar por estado de publicación.
      tags:
        - Galeria
      parameters:
        - name: publicado
          in: query
          description: Filtrar por elementos publicados ('true')
          required: false
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Galería recuperada exitosamente.
    post:
      summary: Crear un elemento en la galería
      description: Crea un nuevo registro multimedia. Requiere rol 'admin'.
      tags:
        - Galeria
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url_archivo
                - tipo_archivo
              properties:
                url_archivo:
                  type: string
                tipo_archivo:
                  type: string
                publicado:
                  type: boolean
                id_torneo:
                  type: integer
                id_partido:
                  type: integer
                id_espacio:
                  type: integer
                id_carrera:
                  type: integer
      responses:
        '201':
          description: Elemento creado con éxito.
  /galeria/{id}:
    put:
      summary: Actualizar un elemento de la galería
      description: Actualiza un registro multimedia existente. Requiere rol 'admin'.
      tags:
        - Galeria
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicado:
                  type: boolean
                id_torneo:
                  type: integer
                id_partido:
                  type: integer
                id_espacio:
                  type: integer
                id_carrera:
                  type: integer
      responses:
        '200':
          description: Elemento actualizado.
    delete:
      summary: Eliminar un elemento de la galería
      description: Elimina un registro multimedia. Requiere rol 'admin'.
      tags:
        - Galeria
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Elemento eliminado correctamente.

  # --- NUEVOS ENDPOINTS DE UPLOAD ---
  /upload:
    post:
      summary: Subir imagen directo a OCI (portada)
      description: Sube una imagen redimensionada y convertida a WebP directamente al bucket de Oracle Cloud.
      tags:
        - Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                imagen:
                  type: string
                  format: binary
                  description: Archivo de imagen o video a subir.
      responses:
        '201':
          description: Imagen subida a OCI exitosamente. Devuelve la URL pública.
  /upload/temp:
    post:
      summary: Subir imagen temporal (mientras se redacta en el editor)
      description: Sube una imagen a una carpeta temporal local del servidor.
      tags:
        - Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                imagen:
                  type: string
                  format: binary
      responses:
        '201':
          description: Imagen guardada temporalmente. Devuelve ruta local (/temp/...).

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NoticiaImageDto:
      type: object
      required:
        - url_storage
        - es_portada
      properties:
        url_storage:
          type: string
          example: https://imagenes.62344037.xyz/n/namespace/b/bucket/o/image.webp
        es_portada:
          type: boolean
          example: true
    CreateNoticiaDto:
      type: object
      required:
        - id_categoria_noticia
        - titulo
        - contenido
      properties:
        id_categoria_noticia:
          type: integer
          example: 2
        titulo:
          type: string
        contenido:
          type: object
        resumen:
          type: string
        publicado:
          type: boolean
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/NoticiaImageDto'
    UpdateNoticiaDto:
      type: object
      properties:
        id_categoria_noticia:
          type: integer
        titulo:
          type: string
        contenido:
          type: object
        resumen:
          type: string
        publicado:
          type: boolean
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/NoticiaImageDto'
    Categoria:
      type: object
      properties:
        id_categoria_noticia:
          type: integer
        nombre:
          type: string
    NoticiaResponse:
      type: object
      properties:
        id_noticia:
          type: integer
        id_usuario_autor:
          type: integer
        id_categoria_noticia:
          type: integer
        titulo:
          type: string
