openapi: 3.0.3
info:
  title: Portal Web Service - Deportes UCB
  description: API microservice for managing news, categories, and portal configurations.
  version: 1.0.0
servers:
  - url: http://localhost:3002
    description: Local development server
paths:
  /:
    get:
      summary: Hello World
      description: Returns a simple hello world greeting.
      responses:
        '200':
          description: Successful response
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!
  /noticias:
    get:
      summary: List all news
      description: Retrieves a list of news items. Supports filtering by publication status.
      parameters:
        - name: publicado
          in: query
          description: Filter news by publication status ('true' or 'false')
          required: false
          schema:
            type: string
            enum: [ 'true', 'false' ]
      responses:
        '200':
          description: List of news items retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoticiaResponse'
    post:
      summary: Create a news item
      description: Creates a new news item. Required Admin permissions.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoticiaDto'
      responses:
        '201':
          description: News item created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Noticia creada con éxito
                  id_noticia:
                    type: integer
                    example: 1
                  contenido:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
  /noticias/categorias:
    get:
      summary: List all news categories
      description: Retrieves all categories for news items.
      responses:
        '200':
          description: List of categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
  /noticias/{id}:
    get:
      summary: Get a news item by ID
      description: Retrieves details of a specific news item.
      parameters:
        - name: id
          in: path
          required: true
          description: News ID
          schema:
            type: integer
      responses:
        '200':
          description: News item retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticiaDetailResponse'
        '404':
          description: News item not found
    put:
      summary: Update a news item by ID
      description: Updates an existing news item. Requires Admin permissions.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: News ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoticiaDto'
      responses:
        '200':
          description: News item updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Noticia actualizada con éxito
                  contenido:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: News item not found
    delete:
      summary: Delete a news item by ID
      description: Deletes an existing news item and its associated images. Requires Admin permissions.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: News ID
          schema:
            type: integer
      responses:
        '200':
          description: News item deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Noticia eliminada con éxito
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: News item not found
  /noticias/usuario/{id_usuario}:
    get:
      summary: Get news items by user author ID
      description: Retrieves a list of news items written by a specific user.
      parameters:
        - name: id_usuario
          in: path
          required: true
          description: Author's user ID
          schema:
            type: integer
      responses:
        '200':
          description: List of news items retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoticiaResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NoticiaImageDto:
      type: object
      required:
        - url_storage
        - es_portada
      properties:
        url_storage:
          type: string
          example: https://imagenes.62344037.xyz/n/namespace/b/bucket/o/image.webp
        es_portada:
          type: boolean
          example: true
    CreateNoticiaDto:
      type: object
      required:
        - id_categoria_noticia
        - titulo
        - contenido
      properties:
        id_usuario_autor:
          type: integer
          description: Automatically inferred from JWT, but can be passed
          example: 1
        id_categoria_noticia:
          type: integer
          example: 2
        titulo:
          type: string
          example: Gran partido de fútbol este fin de semana
        contenido:
          type: object
          description: JSON content (e.g. Editor.js format)
          example: { "blocks": [] }
        resumen:
          type: string
          example: Resumen de la noticia...
        publicado:
          type: boolean
          example: true
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/NoticiaImageDto'
    UpdateNoticiaDto:
      type: object
      properties:
        id_usuario_autor:
          type: integer
        id_categoria_noticia:
          type: integer
        titulo:
          type: string
        contenido:
          type: object
        resumen:
          type: string
        publicado:
          type: boolean
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/NoticiaImageDto'
    Categoria:
      type: object
      properties:
        id_categoria_noticia:
          type: integer
          example: 2
        nombre:
          type: string
          example: Deportes de Campo
    NoticiaResponse:
      type: object
      properties:
        id_noticia:
          type: integer
          example: 1
        id_usuario_autor:
          type: integer
          example: 1
        id_categoria_noticia:
          type: integer
          example: 2
        titulo:
          type: string
          example: Gran partido de fútbol este fin de semana
        contenido:
          type: object
        resumen:
          type: string
          example: Resumen de la noticia...
        publicado:
          type: boolean
          example: true
        fecha_creacion:
          type: string
          format: date-time
        fecha_publicacion:
          type: string
          format: date-time
          nullable: true
        categoria_nombre:
          type: string
          example: Deportes de Campo
        autor_nombre:
          type: string
          example: Juan
        autor_apellido:
          type: string
          example: Pérez
        imagen_portada:
          type: string
          nullable: true
          example: https://imagenes.62344037.xyz/n/namespace/b/bucket/o/image.webp
    NoticiaDetailResponse:
      type: object
      properties:
        id_noticia:
          type: integer
          example: 1
        id_usuario_autor:
          type: integer
          example: 1
        id_categoria_noticia:
          type: integer
          example: 2
        titulo:
          type: string
          example: Gran partido de fútbol este fin de semana
        contenido:
          type: object
        resumen:
          type: string
          example: Resumen de la noticia...
        publicado:
          type: boolean
          example: true
        fecha_creacion:
          type: string
          format: date-time
        fecha_publicacion:
          type: string
          format: date-time
          nullable: true
        categoria_nombre:
          type: string
          example: Deportes de Campo
        autor_nombre:
          type: string
          example: Juan
        autor_apellido:
          type: string
          example: Pérez
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/NoticiaImageDto'
